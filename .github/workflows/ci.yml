name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      # Frontend
      - name: Install client deps
        run: npm ci --prefix client

      - name: Run client tests
        run: npm test --prefix client -- --ci --coverage

      - name: Build client
        run: npm run build --prefix client

      # Backend (will improve after TS conversion)
      - name: Install server deps
        run: npm ci --prefix server

      - name: Run server tests (when ready)
        run: npm test --prefix server || echo "Server tests not set up yet"