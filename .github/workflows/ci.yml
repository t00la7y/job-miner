name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]   # You can add 22.x later

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Root level (for concurrently, etc.)
      - name: Install root dependencies
        run: npm ci

      # Frontend (Vite + React + TS)
      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Lint client
        run: npm run lint --prefix client

      - name: Build client
        run: npm run build --prefix client

      # Backend (Express)
      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Lint server (if you have lint script)
        run: npm run lint --prefix server || echo "No lint script in server yet - skipping"

      - name: Check server builds (optional - just type check if using TS later)
        run: echo "Server build check skipped for now"

      - name: Summary
        run: echo "✅ CI Pipeline completed successfully!"
